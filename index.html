<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Sincere Reflection</title>
    
    <meta name="description" content="A space for reflection and a sincere apology.">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <section id="loading-screen">
        <div class="loader-content">
            <h1 class="logo">Reflection</h1>
            <div class="progress-bar"><div class="progress"></div></div>
            <p id="percentage">0%</p>
        </div>
    </section>

    <nav class="nav-controls">
        <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
        <span id="screen-indicator">Screen 1 / 11</span>
        <button id="nextBtn" class="nav-btn"><i class="fas/chevron-right"></i></button>
    </nav>

    <main id="app">
        <section class="page active" data-index="1">
            <div class="hero-content">
                <h1>Hi...</h1>
                <p>I have something important to tell you.</p>
                <button class="cta-btn" id="startBtn">Begin</button>
            </div>
        </section>

        </main>

    <div class="audio-controls">
        <button id="musicToggle"><i class="fas fa-music"></i></button>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
